<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Details — EventPass</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/js/toast.js" defer></script>
  <script src="/js/gallery.js" defer></script>
  <script src="/js/confetti.js" defer></script>
</head>
<body>
  <header class="navbar">
    <a href="/" class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="3" stroke="url(#g1)" stroke-width="2"/><path d="M8 4v16M16 4v16" stroke="url(#g1)" stroke-width="1.5" stroke-dasharray="2 2"/><defs><linearGradient id="g1" x1="2" y1="4" x2="22" y2="20"><stop stop-color="#7c5cbf"/><stop offset="1" stop-color="#e8a838"/></linearGradient></defs></svg>
      EventPass
    </a>
    <button class="hamburger" onclick="this.closest('.navbar').classList.toggle('nav-open')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <nav>
      <a href="/">Events</a>
      <a href="/admin/login.html">Admin</a>
    </nav>
  </header>

  <main class="container">
    <a href="/" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to Events
    </a>

    <div id="loading" class="loading-spinner"></div>

    <!-- Gallery -->
    <div id="gallery-container" style="display:none;"></div>

    <!-- Event Detail -->
    <div id="event-detail" class="event-detail" style="display:none;">
      <h1 id="event-name"></h1>
      <div class="pills-row" id="event-pills"></div>
      <div class="description" id="event-description"></div>
    </div>

    <!-- Booking Section -->
    <div id="booking-section" class="booking-section" style="display:none;">
      <h2>Reserve Your Passes</h2>
      <div class="form-container" id="booking-form-wrapper">
        <form id="booking-form">
          <div class="form-group">
            <label for="attendee_name">Full Name</label>
            <input type="text" id="attendee_name" placeholder="e.g. Jane Smith" required>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="e.g. jane@example.com" required>
          </div>
          <div class="form-group">
            <label>Number of Passes (1–5)</label>
            <div class="number-stepper">
              <button type="button" id="pass-minus">−</button>
              <input type="number" id="num_passes" value="1" min="1" max="5" readonly>
              <button type="button" id="pass-plus">+</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="book-btn">
            <span>Book Now</span>
            <div class="spinner"></div>
          </button>
        </form>
      </div>
    </div>

    <!-- Error state -->
    <div id="error-state" class="empty-state" style="display:none;">
      <p id="error-text">Event not found.</p>
      <a href="/" class="btn btn-primary">Back to Events</a>
    </div>
  </main>

  <!-- Confirmation Modal -->
  <div class="modal-overlay" id="confirmation-modal">
    <div class="modal-content">
      <div class="checkmark-circle">
        <svg class="checkmark-svg" viewBox="0 0 52 52">
          <circle class="circle" cx="26" cy="26" r="25" fill="none" stroke-width="2"/>
          <path class="check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h3>Booking Confirmed!</h3>
      <p style="color:var(--text-muted); margin-bottom:0.5rem;">Your booking ID</p>
      <div class="booking-id-box" id="booking-id-display"></div>
      <p style="color:var(--text-muted); font-size:0.85rem; margin-top:0.75rem;">Keep this ID for your records.</p>
      <div style="margin-top:1.5rem; display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap;">
        <button class="btn btn-secondary" onclick="document.getElementById('confirmation-modal').classList.remove('show')">Close</button>
        <a href="/" class="btn btn-primary">Browse Events</a>
      </div>
    </div>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var eventId = params.get('id');
    var loadingDiv = document.getElementById('loading');
    var errorState = document.getElementById('error-state');

    if (!eventId) {
      loadingDiv.style.display = 'none';
      errorState.style.display = 'block';
      document.getElementById('error-text').textContent = 'No event ID specified.';
    } else {
      loadEvent();
    }

    // Number stepper
    var passInput = document.getElementById('num_passes');
    document.getElementById('pass-minus').addEventListener('click', function() {
      var v = parseInt(passInput.value); if (v > 1) passInput.value = v - 1;
    });
    document.getElementById('pass-plus').addEventListener('click', function() {
      var v = parseInt(passInput.value); if (v < 5) passInput.value = v + 1;
    });

    async function loadEvent() {
      try {
        var res = await fetch('/api/events/' + eventId);
        var json = await res.json();
        loadingDiv.style.display = 'none';

        if (!json.success) {
          errorState.style.display = 'block';
          document.getElementById('error-text').textContent = json.message || 'Event not found.';
          return;
        }

        var event = json.data;
        document.title = event.name + ' — EventPass';
        document.getElementById('event-name').textContent = event.name;
        document.getElementById('event-description').textContent = event.description;

        // Pills
        var seatColor = event.available_seats > 20 ? 'var(--success)' : event.available_seats > 0 ? 'var(--accent)' : 'var(--error)';
        var seatsText = event.available_seats > 0 ? event.available_seats + ' / ' + event.total_seats + ' available' : 'Sold Out';
        document.getElementById('event-pills').innerHTML =
          '<span class="pill"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/><path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> ' + formatDate(event.date) + '</span>' +
          '<span class="pill"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="2"/></svg> ' + escapeHTML(event.location) + '</span>' +
          '<span class="pill" style="background:rgba(255,255,255,0.05);color:' + seatColor + '">' + seatsText + '</span>';

        // Gallery
        if (event.images && event.images.length > 0) {
          document.getElementById('gallery-container').style.display = 'block';
          initGallery('gallery-container', event.images);
        }

        document.getElementById('event-detail').style.display = 'block';

        // Booking form
        var bookingSection = document.getElementById('booking-section');
        if (event.available_seats > 0) {
          bookingSection.style.display = 'block';
        } else {
          bookingSection.style.display = 'block';
          document.getElementById('booking-form-wrapper').innerHTML =
            '<p style="color:var(--error); font-weight:600; padding:1.5rem; text-align:center;">This event is sold out.</p>';
        }

      } catch (err) {
        loadingDiv.style.display = 'none';
        errorState.style.display = 'block';
        document.getElementById('error-text').textContent = 'Could not connect to server.';
        console.error(err);
      }
    }

    // Booking form submission
    var bookingForm = document.getElementById('booking-form');
    if (bookingForm) {
      bookingForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        var bookBtn = document.getElementById('book-btn');
        if (bookBtn.classList.contains('loading')) return;
        bookBtn.classList.add('loading');
        bookBtn.disabled = true;

        var payload = {
          attendee_name: document.getElementById('attendee_name').value.trim(),
          email: document.getElementById('email').value.trim(),
          num_passes: parseInt(document.getElementById('num_passes').value, 10)
        };

        try {
          var res = await fetch('/api/events/' + eventId + '/book', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          var json = await res.json();

          if (json.success) {
            document.getElementById('booking-id-display').textContent = json.data.id;
            document.getElementById('confirmation-modal').classList.add('show');
            bookingForm.reset();
            document.getElementById('num_passes').value = '1';
            if (typeof fireConfetti === 'function') fireConfetti();
            // Refresh event data
            loadEvent();
          } else {
            showToast(json.message || 'Booking failed.', 'error');
          }
        } catch (err) {
          showToast('Could not connect to server.', 'error');
          console.error(err);
        } finally {
          bookBtn.classList.remove('loading');
          bookBtn.disabled = false;
        }
      });
    }

    function formatDate(dateStr) {
      var d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
    }
    function escapeHTML(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
